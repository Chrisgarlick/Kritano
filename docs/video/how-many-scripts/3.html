<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=450" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --video-duration: 36s;
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    }
    html { width: 450px; height: 800px; overflow: hidden; background: #312E81; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      font-family: 'Outfit', system-ui, sans-serif;
      position: relative;
      transform: scale(0.41667); transform-origin: top left;
    }
    .canvas {
      width: 1080px; height: 1920px; position: relative; overflow: hidden;
      background: linear-gradient(135deg, #4F46E5 0%, #312E81 100%);
      background-size: 200% 200%;
      animation: bg-shift 12s linear infinite;
    }
    .atmosphere { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .content { position: relative; z-index: 1; height: calc(1920px - 60px); }
    .beat {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; text-align: center; padding: 100px;
    }
    .brand-reserve {
      position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
      display: flex; align-items: center; justify-content: center; z-index: 2;
    }

    /* Atmospheric */
    @keyframes bg-shift {
      0%, 100% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
    }
    @keyframes drift-glow {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.2; }
      50% { transform: translate(60px, 80px) scale(1.3); opacity: 0.25; }
    }
    @keyframes wordmark-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.5; }
    }

    /* Beat 1: "1" (0–5s = 0–14%) */
    @keyframes b1 {
      0% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
      4% { opacity: 1; transform: scale(1); filter: blur(0); }
      11% { opacity: 1; transform: scale(1); filter: blur(0); }
      16% { opacity: 0; transform: scale(1.05); filter: blur(6px); }
      18% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
      100% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
    }
    /* Beat 2: "12" (5–9s = 14–25%) */
    @keyframes b2 {
      0% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
      14% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
      18% { opacity: 1; transform: scale(1); filter: blur(0); }
      22% { opacity: 1; transform: scale(1); filter: blur(0); }
      27% { opacity: 0; transform: scale(1.05); filter: blur(6px); }
      29% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
      100% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
    }
    /* Beat 3: "47" (9–13s = 25–36%) */
    @keyframes b3 {
      0% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
      25% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
      29% { opacity: 1; transform: scale(1); filter: blur(0); }
      33% { opacity: 1; transform: scale(1); filter: blur(0); }
      38% { opacity: 0; transform: scale(1.05); filter: blur(6px); }
      40% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
      100% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
    }
    /* Beat 4: "89" (13–17s = 36–47%) */
    @keyframes b4 {
      0% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
      36% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
      40% { opacity: 1; transform: scale(1); filter: blur(0); }
      44% { opacity: 1; transform: scale(1); filter: blur(0); }
      49% { opacity: 0; transform: scale(1.05); filter: blur(6px); }
      51% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
      100% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
    }
    /* Beat 5: "127" — holds longer (17–24s = 47–67%) */
    @keyframes b5 {
      0% { opacity: 0; transform: scale(0.6); filter: blur(10px); }
      47% { opacity: 0; transform: scale(0.6); filter: blur(10px); }
      52% { opacity: 1; transform: scale(1); filter: blur(0); }
      62% { opacity: 1; transform: scale(1); filter: blur(0); }
      67% { opacity: 0; transform: scale(1.08); filter: blur(8px); }
      69% { opacity: 0; transform: scale(0.6); filter: blur(10px); }
      100% { opacity: 0; transform: scale(0.6); filter: blur(10px); }
    }
    @keyframes b5-label {
      0% { opacity: 0; transform: translateY(20px); }
      53% { opacity: 0; transform: translateY(20px); }
      57% { opacity: 1; transform: translateY(0); }
      61% { opacity: 1; transform: translateY(0); }
      66% { opacity: 0; transform: translateY(-15px); }
      68% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 0; transform: translateY(20px); }
    }
    @keyframes pulse-red {
      0%, 100% { text-shadow: 0 0 0 transparent; }
      50% { text-shadow: 0 0 60px rgba(239, 68, 68, 0.3); }
    }

    /* Beat 6: Reaction (24–29s = 67–81%) */
    @keyframes b6 {
      0% { opacity: 0; transform: translateY(25px); }
      67% { opacity: 0; transform: translateY(25px); }
      72% { opacity: 1; transform: translateY(0); }
      78% { opacity: 1; transform: translateY(0); }
      83% { opacity: 0; transform: translateY(-20px); }
      85% { opacity: 0; transform: translateY(25px); }
      100% { opacity: 0; transform: translateY(25px); }
    }

    /* Beat 7: Statement (29–35s = 81–97%) */
    @keyframes b7a {
      0% { opacity: 0; transform: translateY(30px); }
      81% { opacity: 0; transform: translateY(30px); }
      85% { opacity: 1; transform: translateY(0); }
      92% { opacity: 1; transform: translateY(0); }
      97% { opacity: 0; transform: translateY(-20px); }
      99% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 0; transform: translateY(30px); }
    }
    @keyframes b7b {
      0% { opacity: 0; transform: translateY(30px); }
      83% { opacity: 0; transform: translateY(30px); }
      87% { opacity: 1; transform: translateY(0); }
      91% { opacity: 1; transform: translateY(0); }
      96% { opacity: 0; transform: translateY(-20px); }
      98% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 0; transform: translateY(30px); }
    }
    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 0 transparent; }
      50% { text-shadow: 0 0 40px rgba(255, 255, 255, 0.2); }
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="atmosphere">
      <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:40px 40px;opacity:0.5;"></div>
      <div style="position:absolute;top:200px;left:50%;transform:translateX(-50%);width:900px;height:900px;background:rgba(129,140,248,0.15);border-radius:50%;filter:blur(150px);animation:drift-glow 8s ease-in-out infinite;"></div>
    </div>

    <div class="content">
      <!-- Beat 1: "1" — green, calm -->
      <div class="beat">
        <p style="font-size:200px;font-weight:700;color:#10B981;opacity:0;animation:b1 var(--video-duration) var(--ease-smooth) infinite;">1</p>
        <p style="font-size:36px;font-weight:400;color:rgba(255,255,255,0.5);margin-top:16px;opacity:0;animation:b1 var(--video-duration) var(--ease-smooth) infinite;">script</p>
      </div>

      <!-- Beat 2: "12" — still green -->
      <div class="beat">
        <p style="font-size:200px;font-weight:700;color:#10B981;opacity:0;animation:b2 var(--video-duration) var(--ease-smooth) infinite;">12</p>
        <p style="font-size:36px;font-weight:400;color:rgba(255,255,255,0.5);margin-top:16px;opacity:0;animation:b2 var(--video-duration) var(--ease-smooth) infinite;">scripts</p>
      </div>

      <!-- Beat 3: "47" — amber, concern -->
      <div class="beat">
        <p style="font-size:200px;font-weight:700;color:#FBBF24;opacity:0;animation:b3 var(--video-duration) var(--ease-smooth) infinite;">47</p>
        <p style="font-size:36px;font-weight:400;color:rgba(255,255,255,0.5);margin-top:16px;opacity:0;animation:b3 var(--video-duration) var(--ease-smooth) infinite;">scripts</p>
      </div>

      <!-- Beat 4: "89" — orange, alarm -->
      <div class="beat">
        <p style="font-size:200px;font-weight:700;color:#F97316;opacity:0;animation:b4 var(--video-duration) var(--ease-smooth) infinite;">89</p>
        <p style="font-size:36px;font-weight:400;color:rgba(255,255,255,0.5);margin-top:16px;opacity:0;animation:b4 var(--video-duration) var(--ease-smooth) infinite;">scripts</p>
      </div>

      <!-- Beat 5: "127" — red, shock, holds longer -->
      <div class="beat">
        <p style="font-size:200px;font-weight:700;color:#EF4444;opacity:0;animation:b5 var(--video-duration) var(--ease-smooth) infinite, pulse-red 2s ease-in-out infinite;">127</p>
        <p style="font-size:40px;font-weight:500;color:rgba(255,255,255,0.7);margin-top:20px;opacity:0;animation:b5-label var(--video-duration) var(--ease-smooth) infinite;">scripts. One page.</p>
      </div>

      <!-- Beat 6: Reaction -->
      <div class="beat">
        <p style="font-family:'Instrument Serif',Georgia,serif;font-size:72px;font-weight:400;color:#FFFFFF;line-height:1.2;max-width:780px;opacity:0;animation:b6 var(--video-duration) var(--ease-smooth) infinite;">Each one slowing your site, tracking your users, and increasing your attack surface.</p>
      </div>

      <!-- Beat 7: Statement -->
      <div class="beat">
        <p style="font-size:42px;font-weight:300;color:rgba(255,255,255,0.5);opacity:0;animation:b7a var(--video-duration) var(--ease-smooth) infinite;">Kritano catches every one.</p>
        <p style="font-family:'Instrument Serif',Georgia,serif;font-size:96px;font-weight:400;color:#FFFFFF;margin-top:20px;opacity:0;animation:b7b var(--video-duration) var(--ease-smooth) infinite, pulse-glow 3s ease-in-out infinite;">Automatically.</p>
      </div>
    </div>

    <div class="brand-reserve">
      <span style="font-family:'Outfit',sans-serif;font-weight:600;font-size:18px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);animation:wordmark-pulse 4s ease-in-out infinite;"><svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:8px;display:inline-block;"><rect width="32" height="32" rx="7" fill="#4f46e5"/><rect x="3" y="3" width="26" height="26" rx="5" fill="#312e81"/><path d="M10 7 L10 25 L13.5 25 L13.5 17.5 L19.5 25 L24 25 L17 16 L23.5 7 L19.5 7 L13.5 14.5 L13.5 7 Z" fill="white"/><circle cx="24" cy="6.5" r="2.5" fill="#fbbf24"/></svg>Kritano</span>
    </div>
  </div>
</body>
</html>
