<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=450" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --video-duration: 36s;
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    }
    html { width: 450px; height: 800px; overflow: hidden; background: #F8FAFC; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      font-family: 'Outfit', system-ui, sans-serif;
      position: relative;
      transform: scale(0.41667); transform-origin: top left;
    }
    .canvas { width: 1080px; height: 1920px; position: relative; overflow: hidden; background: #F8FAFC; }
    .atmosphere { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .content { position: relative; z-index: 1; height: calc(1920px - 60px); }
    .scene {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      padding: 300px 100px 100px; display: flex; flex-direction: column;
    }
    .scene--center { justify-content: center; align-items: center; text-align: center; padding-top: 100px; }
    .brand-reserve {
      position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
      display: flex; align-items: center; justify-content: center; z-index: 2;
    }

    /* Atmospheric */
    @keyframes drift-indigo {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(80px, 100px) scale(1.2); }
    }
    @keyframes drift-amber {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-50px, -70px) scale(1.15); }
    }
    @keyframes wordmark-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.8; }
    }

    /* Scene A: Hook (0–8s = 0–22%) */
    @keyframes sa-label {
      0% { opacity: 0; transform: translateY(30px); }
      4% { opacity: 1; transform: translateY(0); }
      17% { opacity: 1; transform: translateY(0); }
      22% { opacity: 0; transform: translateY(-20px); }
      24% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 0; transform: translateY(30px); }
    }
    @keyframes sa-headline {
      0% { opacity: 0; transform: translateY(40px); }
      2% { opacity: 0; transform: translateY(40px); }
      7% { opacity: 1; transform: translateY(0); }
      17% { opacity: 1; transform: translateY(0); }
      22% { opacity: 0; transform: translateY(-20px); }
      24% { opacity: 0; transform: translateY(40px); }
      100% { opacity: 0; transform: translateY(40px); }
    }

    /* Scene B: Counter climbing (7–19s = 19–53%) */
    @keyframes sb-wrap {
      0% { opacity: 0; transform: translateY(40px); }
      19% { opacity: 0; transform: translateY(40px); }
      24% { opacity: 1; transform: translateY(0); }
      47% { opacity: 1; transform: translateY(0); }
      53% { opacity: 0; transform: translateY(-30px); }
      55% { opacity: 0; transform: translateY(40px); }
      100% { opacity: 0; transform: translateY(40px); }
    }
    /* Counter numbers — each visible for a brief window, stacked */
    @keyframes cn1 { 0%,23% { opacity:0; } 24% { opacity:1; } 27% { opacity:1; } 28% { opacity:0; } 100% { opacity:0; } }
    @keyframes cn2 { 0%,27% { opacity:0; } 28% { opacity:1; } 31% { opacity:1; } 32% { opacity:0; } 100% { opacity:0; } }
    @keyframes cn3 { 0%,31% { opacity:0; } 32% { opacity:1; } 35% { opacity:1; } 36% { opacity:0; } 100% { opacity:0; } }
    @keyframes cn4 { 0%,35% { opacity:0; } 36% { opacity:1; } 39% { opacity:1; } 40% { opacity:0; } 100% { opacity:0; } }
    @keyframes cn5 { 0%,39% { opacity:0; } 40% { opacity:1; } 43% { opacity:1; } 44% { opacity:0; } 100% { opacity:0; } }
    @keyframes cn6 { 0%,43% { opacity:0; } 44% { opacity:1; } 52% { opacity:1; } 53% { opacity:0; } 100% { opacity:0; } }
    /* "scripts detected" label */
    @keyframes sb-label {
      0% { opacity: 0; transform: translateY(20px); }
      26% { opacity: 0; transform: translateY(20px); }
      30% { opacity: 1; transform: translateY(0); }
      47% { opacity: 1; transform: translateY(0); }
      52% { opacity: 0; transform: translateY(-15px); }
      54% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 0; transform: translateY(20px); }
    }
    /* Counter colour shift */
    @keyframes counter-color {
      0%,23% { color: #10B981; }
      32% { color: #10B981; }
      36% { color: #F59E0B; }
      40% { color: #F97316; }
      44% { color: #EF4444; }
      100% { color: #EF4444; }
    }
    /* Progress bar filling */
    @keyframes bar-fill {
      0%,23% { transform: scaleX(0); background: #10B981; }
      28% { transform: scaleX(0.15); background: #10B981; }
      32% { transform: scaleX(0.3); background: #10B981; }
      36% { transform: scaleX(0.5); background: #F59E0B; }
      40% { transform: scaleX(0.7); background: #F97316; }
      44% { transform: scaleX(1); background: #EF4444; }
      52% { transform: scaleX(1); background: #EF4444; }
      53% { transform: scaleX(0); background: #10B981; }
      100% { transform: scaleX(0); background: #10B981; }
    }

    /* Scene C: Big reveal + context (18–28s = 50–78%) */
    @keyframes sc-stat {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0; transform: scale(0.5); }
      56% { opacity: 1; transform: scale(1); }
      69% { opacity: 1; transform: scale(1); }
      75% { opacity: 0; transform: scale(0.85); }
      77% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 0; transform: scale(0.5); }
    }
    @keyframes sc-context1 {
      0% { opacity: 0; transform: translateY(25px); }
      55% { opacity: 0; transform: translateY(25px); }
      60% { opacity: 1; transform: translateY(0); }
      68% { opacity: 1; transform: translateY(0); }
      73% { opacity: 0; transform: translateY(-15px); }
      75% { opacity: 0; transform: translateY(25px); }
      100% { opacity: 0; transform: translateY(25px); }
    }
    @keyframes sc-context2 {
      0% { opacity: 0; transform: translateY(25px); }
      58% { opacity: 0; transform: translateY(25px); }
      63% { opacity: 1; transform: translateY(0); }
      67% { opacity: 1; transform: translateY(0); }
      72% { opacity: 0; transform: translateY(-15px); }
      74% { opacity: 0; transform: translateY(25px); }
      100% { opacity: 0; transform: translateY(25px); }
    }

    /* Scene D: Statement (27–34s = 75–94%) */
    @keyframes sd-line1 {
      0% { opacity: 0; transform: translateY(30px); }
      75% { opacity: 0; transform: translateY(30px); }
      80% { opacity: 1; transform: translateY(0); }
      89% { opacity: 1; transform: translateY(0); }
      94% { opacity: 0; transform: translateY(-20px); }
      96% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 0; transform: translateY(30px); }
    }
    @keyframes sd-line2 {
      0% { opacity: 0; transform: translateY(30px); }
      78% { opacity: 0; transform: translateY(30px); }
      83% { opacity: 1; transform: translateY(0); }
      88% { opacity: 1; transform: translateY(0); }
      93% { opacity: 0; transform: translateY(-20px); }
      95% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 0; transform: translateY(30px); }
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="atmosphere">
      <div style="position:absolute;top:-120px;left:-100px;width:600px;height:600px;background:#EEF2FF;border-radius:50%;opacity:0.7;filter:blur(100px);animation:drift-indigo 8s ease-in-out infinite;"></div>
      <div style="position:absolute;bottom:100px;right:-80px;width:450px;height:450px;background:#FFFBEB;border-radius:50%;opacity:0.6;filter:blur(100px);animation:drift-amber 10s ease-in-out infinite;"></div>
    </div>

    <div class="content">
      <!-- Scene A: Hook -->
      <div class="scene">
        <p style="font-size:26px;font-weight:600;color:#4F46E5;text-transform:uppercase;letter-spacing:0.12em;opacity:0;animation:sa-label var(--video-duration) var(--ease-smooth) infinite;">Performance check</p>
        <h1 style="font-family:'Instrument Serif',Georgia,serif;font-size:80px;font-weight:400;color:#0F172A;line-height:1.1;margin-top:28px;opacity:0;animation:sa-headline var(--video-duration) var(--ease-smooth) infinite;">How many scripts is <em>your</em> website loading?</h1>
      </div>

      <!-- Scene B: Counter -->
      <div class="scene" style="align-items:center;padding-top:340px;">
        <div style="opacity:0;animation:sb-wrap var(--video-duration) var(--ease-smooth) infinite;display:flex;flex-direction:column;align-items:center;">
          <!-- Counter numbers stacked -->
          <div style="position:relative;width:400px;height:200px;display:flex;align-items:center;justify-content:center;">
            <span style="position:absolute;font-size:180px;font-weight:700;opacity:0;animation:cn1 var(--video-duration) var(--ease-smooth) infinite,counter-color var(--video-duration) var(--ease-smooth) infinite;">3</span>
            <span style="position:absolute;font-size:180px;font-weight:700;opacity:0;animation:cn2 var(--video-duration) var(--ease-smooth) infinite,counter-color var(--video-duration) var(--ease-smooth) infinite;">18</span>
            <span style="position:absolute;font-size:180px;font-weight:700;opacity:0;animation:cn3 var(--video-duration) var(--ease-smooth) infinite,counter-color var(--video-duration) var(--ease-smooth) infinite;">47</span>
            <span style="position:absolute;font-size:180px;font-weight:700;opacity:0;animation:cn4 var(--video-duration) var(--ease-smooth) infinite,counter-color var(--video-duration) var(--ease-smooth) infinite;">89</span>
            <span style="position:absolute;font-size:180px;font-weight:700;opacity:0;animation:cn5 var(--video-duration) var(--ease-smooth) infinite,counter-color var(--video-duration) var(--ease-smooth) infinite;">112</span>
            <span style="position:absolute;font-size:180px;font-weight:700;opacity:0;animation:cn6 var(--video-duration) var(--ease-smooth) infinite,counter-color var(--video-duration) var(--ease-smooth) infinite;">127</span>
          </div>
          <!-- "scripts detected" -->
          <p style="font-size:36px;font-weight:500;color:#64748B;margin-top:16px;opacity:0;animation:sb-label var(--video-duration) var(--ease-smooth) infinite;">scripts detected</p>
          <!-- Progress bar -->
          <div style="width:600px;height:12px;background:#E2E8F0;border-radius:6px;overflow:hidden;margin-top:40px;">
            <div style="width:100%;height:100%;border-radius:6px;transform-origin:left;transform:scaleX(0);animation:bar-fill var(--video-duration) var(--ease-smooth) infinite;"></div>
          </div>
        </div>
      </div>

      <!-- Scene C: Context -->
      <div class="scene" style="padding-top:280px;">
        <p style="font-size:160px;font-weight:700;color:#EF4444;line-height:1;opacity:0;animation:sc-stat var(--video-duration) var(--ease-smooth) infinite;">127</p>
        <p style="font-size:42px;font-weight:400;color:#334155;line-height:1.4;margin-top:32px;max-width:700px;opacity:0;animation:sc-context1 var(--video-duration) var(--ease-smooth) infinite;">Third-party scripts. Each one slowing your site and leaking user data.</p>
        <p style="font-family:'JetBrains Mono',monospace;font-size:28px;color:#94A3B8;margin-top:28px;opacity:0;animation:sc-context2 var(--video-duration) var(--ease-smooth) infinite;">+4.2s load time &middot; 23 trackers &middot; 3 vulnerabilities</p>
      </div>

      <!-- Scene D: Statement -->
      <div class="scene scene--center">
        <p style="font-size:44px;font-weight:300;color:#64748B;opacity:0;animation:sd-line1 var(--video-duration) var(--ease-smooth) infinite;">Kritano catches every one.</p>
        <p style="font-family:'Instrument Serif',Georgia,serif;font-size:88px;font-weight:400;color:#4F46E5;margin-top:20px;opacity:0;animation:sd-line2 var(--video-duration) var(--ease-smooth) infinite;">Automatically.</p>
      </div>
    </div>

    <div class="brand-reserve">
      <span style="font-family:'Outfit',sans-serif;font-weight:600;font-size:18px;letter-spacing:0.15em;text-transform:uppercase;color:#94A3B8;animation:wordmark-pulse 4s ease-in-out infinite;">Kritano</span>
    </div>
  </div>
</body>
</html>
