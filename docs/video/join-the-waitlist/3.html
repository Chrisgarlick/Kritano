<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=450" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --video-duration: 36s; --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1); }
    html { width: 450px; height: 800px; overflow: hidden; background: #312E81; }
    body { width: 1080px; height: 1920px; overflow: hidden; font-family: 'Outfit', system-ui, sans-serif; position: relative; transform: scale(0.41667); transform-origin: top left; }
    .canvas { width: 1080px; height: 1920px; position: relative; overflow: hidden; background: linear-gradient(135deg, #4F46E5 0%, #312E81 100%); background-size: 200% 200%; animation: bg-shift 12s linear infinite; }
    .atmosphere { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .content { position: relative; z-index: 1; height: calc(1920px - 60px); }
    .beat { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 100px; }
    .brand-reserve { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; display: flex; align-items: center; justify-content: center; z-index: 2; }

    @keyframes bg-shift { 0%, 100% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } }
    @keyframes drift-glow { 0%, 100% { transform: translate(0,0) scale(1); opacity: 0.2; } 50% { transform: translate(60px,80px) scale(1.3); opacity: 0.25; } }
    @keyframes wordmark-pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.5; } }

    /* Beat 1: "Scanning..." (0-5s = 0-14%) */
    @keyframes b1 {
      0% { opacity:0;transform:scale(0.85);filter:blur(8px); }
      5% { opacity:1;transform:scale(1);filter:blur(0); }
      11% { opacity:1;transform:scale(1);filter:blur(0); }
      16% { opacity:0;transform:scale(1.04);filter:blur(6px); }
      18% { opacity:0;transform:scale(0.85);filter:blur(8px); }
      100% { opacity:0;transform:scale(0.85);filter:blur(8px); }
    }
    @keyframes scan-dots {
      0%, 33% { opacity: 0.3; }
      34%, 66% { opacity: 0.6; }
      67%, 100% { opacity: 1; }
    }

    /* Beat 2: SEO 87 (5-10s = 14-28%) */
    @keyframes b2 {
      0% { opacity:0;transform:translateY(30px); }
      14% { opacity:0;transform:translateY(30px); }
      19% { opacity:1;transform:translateY(0); }
      25% { opacity:1;transform:translateY(0); }
      30% { opacity:0;transform:translateY(-20px); }
      32% { opacity:0;transform:translateY(30px); }
      100% { opacity:0;transform:translateY(30px); }
    }

    /* Beat 3: A11Y 92 (10-15s = 28-42%) */
    @keyframes b3 {
      0% { opacity:0;transform:translateY(30px); }
      28% { opacity:0;transform:translateY(30px); }
      33% { opacity:1;transform:translateY(0); }
      39% { opacity:1;transform:translateY(0); }
      44% { opacity:0;transform:translateY(-20px); }
      46% { opacity:0;transform:translateY(30px); }
      100% { opacity:0;transform:translateY(30px); }
    }

    /* Beat 4: Security 71 (15-19s = 42-53%) */
    @keyframes b4 {
      0% { opacity:0;transform:translateY(30px); }
      42% { opacity:0;transform:translateY(30px); }
      47% { opacity:1;transform:translateY(0); }
      50% { opacity:1;transform:translateY(0); }
      55% { opacity:0;transform:translateY(-20px); }
      57% { opacity:0;transform:translateY(30px); }
      100% { opacity:0;transform:translateY(30px); }
    }

    /* Beat 5: Overall 82 (19-25s = 53-69%) */
    @keyframes b5 {
      0% { opacity:0;transform:scale(0.6);filter:blur(10px); }
      53% { opacity:0;transform:scale(0.6);filter:blur(10px); }
      58% { opacity:1;transform:scale(1);filter:blur(0); }
      65% { opacity:1;transform:scale(1);filter:blur(0); }
      70% { opacity:0;transform:scale(1.06);filter:blur(8px); }
      72% { opacity:0;transform:scale(0.6);filter:blur(10px); }
      100% { opacity:0;transform:scale(0.6);filter:blur(10px); }
    }
    @keyframes b5-sub {
      0% { opacity:0;transform:translateY(20px); }
      59% { opacity:0;transform:translateY(20px); }
      63% { opacity:1;transform:translateY(0); }
      64% { opacity:1;transform:translateY(0); }
      69% { opacity:0;transform:translateY(-15px); }
      71% { opacity:0;transform:translateY(20px); }
      100% { opacity:0;transform:translateY(20px); }
    }

    /* Beat 6: CTA (25-35s = 69-97%) */
    @keyframes b6a {
      0% { opacity:0;transform:translateY(30px); }
      69% { opacity:0;transform:translateY(30px); }
      74% { opacity:1;transform:translateY(0); }
      86% { opacity:1;transform:translateY(0); }
      92% { opacity:0;transform:translateY(-20px); }
      94% { opacity:0;transform:translateY(30px); }
      100% { opacity:0;transform:translateY(30px); }
    }
    @keyframes b6b {
      0% { opacity:0;transform:translateY(30px); }
      72% { opacity:0;transform:translateY(30px); }
      77% { opacity:1;transform:translateY(0); }
      85% { opacity:1;transform:translateY(0); }
      91% { opacity:0;transform:translateY(-20px); }
      93% { opacity:0;transform:translateY(30px); }
      100% { opacity:0;transform:translateY(30px); }
    }
    @keyframes b6-btn {
      0% { opacity:0;transform:translateY(20px) scale(0.95); }
      75% { opacity:0;transform:translateY(20px) scale(0.95); }
      80% { opacity:1;transform:translateY(0) scale(1); }
      89% { opacity:1;transform:translateY(0) scale(1); }
      94% { opacity:0;transform:translateY(-15px) scale(0.97); }
      96% { opacity:0;transform:translateY(20px) scale(0.95); }
      100% { opacity:0;transform:translateY(20px) scale(0.95); }
    }
    @keyframes btn-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); } 50% { box-shadow: 0 0 0 14px rgba(255,255,255,0.1); } }
    @keyframes pulse-glow { 0%, 100% { text-shadow: 0 0 0 transparent; } 50% { text-shadow: 0 0 40px rgba(255,255,255,0.2); } }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="atmosphere">
      <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:40px 40px;opacity:0.5;"></div>
      <div style="position:absolute;top:200px;left:50%;transform:translateX(-50%);width:900px;height:900px;background:rgba(129,140,248,0.15);border-radius:50%;filter:blur(150px);animation:drift-glow 8s ease-in-out infinite;"></div>
    </div>

    <div class="content">
      <!-- Beat 1: Scanning -->
      <div class="beat">
        <p style="font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:500;color:rgba(255,255,255,0.8);opacity:0;animation:b1 var(--video-duration) var(--ease-smooth) infinite;">Scanning<span style="display:inline-block;width:60px;text-align:left;"><span style="animation:scan-dots 1.2s steps(3) infinite;">...</span></span></p>
        <!-- Decorative scan line -->
        <div style="width:300px;height:3px;background:rgba(255,255,255,0.3);margin-top:32px;border-radius:2px;overflow:hidden;opacity:0;animation:b1 var(--video-duration) var(--ease-smooth) infinite;">
          <div style="width:30%;height:100%;background:#FFFFFF;border-radius:2px;animation:scan-sweep 1.5s ease-in-out infinite;"></div>
        </div>
      </div>

      <!-- Beat 2: SEO -->
      <div class="beat">
        <p style="font-size:28px;font-weight:600;color:#8B5CF6;text-transform:uppercase;letter-spacing:0.15em;opacity:0;animation:b2 var(--video-duration) var(--ease-smooth) infinite;">SEO</p>
        <p style="font-family:'Instrument Serif',Georgia,serif;font-size:180px;font-weight:400;color:#FFFFFF;margin-top:8px;opacity:0;animation:b2 var(--video-duration) var(--ease-smooth) infinite;">87</p>
      </div>

      <!-- Beat 3: Accessibility -->
      <div class="beat">
        <p style="font-size:28px;font-weight:600;color:#10B981;text-transform:uppercase;letter-spacing:0.15em;opacity:0;animation:b3 var(--video-duration) var(--ease-smooth) infinite;">Accessibility</p>
        <p style="font-family:'Instrument Serif',Georgia,serif;font-size:180px;font-weight:400;color:#FFFFFF;margin-top:8px;opacity:0;animation:b3 var(--video-duration) var(--ease-smooth) infinite;">92</p>
      </div>

      <!-- Beat 4: Security -->
      <div class="beat">
        <p style="font-size:28px;font-weight:600;color:#EF4444;text-transform:uppercase;letter-spacing:0.15em;opacity:0;animation:b4 var(--video-duration) var(--ease-smooth) infinite;">Security</p>
        <p style="font-family:'Instrument Serif',Georgia,serif;font-size:180px;font-weight:400;color:#FFFFFF;margin-top:8px;opacity:0;animation:b4 var(--video-duration) var(--ease-smooth) infinite;">71</p>
      </div>

      <!-- Beat 5: Overall -->
      <div class="beat">
        <p style="font-size:200px;font-weight:700;color:#FFFFFF;line-height:1;opacity:0;animation:b5 var(--video-duration) var(--ease-smooth) infinite, pulse-glow 3s ease-in-out infinite;">82</p>
        <p style="font-size:42px;font-weight:400;color:rgba(255,255,255,0.6);margin-top:20px;opacity:0;animation:b5-sub var(--video-duration) var(--ease-smooth) infinite;">Overall score</p>
      </div>

      <!-- Beat 6: CTA -->
      <div class="beat">
        <p style="font-size:44px;font-weight:300;color:rgba(255,255,255,0.5);opacity:0;animation:b6a var(--video-duration) var(--ease-smooth) infinite;">What's yours?</p>
        <p style="font-family:'Instrument Serif',Georgia,serif;font-size:88px;font-weight:400;color:#FFFFFF;margin-top:20px;opacity:0;animation:b6b var(--video-duration) var(--ease-smooth) infinite;">Join the waitlist.</p>
        <div style="margin-top:48px;padding:20px 56px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:14px;opacity:0;animation:b6-btn var(--video-duration) var(--ease-smooth) infinite, btn-glow 2s ease-in-out infinite;">
          <span style="font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:500;color:#FFFFFF;">pagepulser.com</span>
        </div>
      </div>
    </div>

    <div class="brand-reserve">
      <span style="font-family:'Outfit',sans-serif;font-weight:600;font-size:18px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);animation:wordmark-pulse 4s ease-in-out infinite;">PagePulser</span>
    </div>
  </div>
</body>
</html>
