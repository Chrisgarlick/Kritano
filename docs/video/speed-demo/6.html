<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=450" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --d: 36s; --e: cubic-bezier(0.4, 0, 0.2, 1); }
    html { width: 450px; height: 800px; overflow: hidden; background: #312E81; }
    body { width: 1080px; height: 1920px; overflow: hidden; font-family: 'Outfit', system-ui, sans-serif; position: relative; transform: scale(0.41667); transform-origin: top left; }
    .canvas { width: 1080px; height: 1920px; position: relative; overflow: hidden; background: linear-gradient(135deg, #4F46E5 0%, #312E81 100%); background-size: 200% 200%; animation: bs 12s linear infinite; }
    .atm { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .content { position: relative; z-index: 1; height: calc(1920px - 60px); }
    .bt { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 100px; }
    .br { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; display: flex; align-items: center; justify-content: center; z-index: 2; }

    @keyframes bs { 0%,100% { background-position:0% 0%; } 50% { background-position:100% 100%; } }
    @keyframes dg { 0%,100% { transform:translate(0,0) scale(1); opacity:.2; } 50% { transform:translate(60px,80px) scale(1.3); opacity:.25; } }
    @keyframes wp { 0%,100% { opacity:.3; } 50% { opacity:.5; } }

    /* Beat 1: "Paste your URL" (0-4s = 0-11%) */
    @keyframes b1 {
      0% { opacity:0;transform:scale(0.85);filter:blur(8px); }
      4% { opacity:1;transform:scale(1);filter:blur(0); }
      8% { opacity:1; }
      12% { opacity:0;transform:scale(1.04);filter:blur(6px); }
      14% { opacity:0;transform:scale(0.85);filter:blur(8px); }
      100% { opacity:0;transform:scale(0.85);filter:blur(8px); }
    }

    /* Beat 2: URL typing (4-10s = 11-28%) */
    @keyframes b2-wrap {
      0% { opacity:0; } 11% { opacity:0; } 13% { opacity:1; }
      25% { opacity:1; } 28% { opacity:0; } 100% { opacity:0; }
    }
    @keyframes url-type {
      0%,13% { width:0; } 15% { width:1ch; } 16% { width:3ch; }
      17% { width:5ch; } 18% { width:8ch; } 19% { width:10ch; }
      20% { width:12ch; } 28% { width:12ch; } 100% { width:12ch; }
    }
    @keyframes cb { 0%,49% { border-right-color:rgba(255,255,255,0.7); } 50%,100% { border-right-color:transparent; } }

    /* Beat 3: "Full Audit" selected (10-15s = 28-42%) */
    @keyframes b3 {
      0% { opacity:0;transform:translateY(25px); }
      28% { opacity:0;transform:translateY(25px); }
      32% { opacity:1;transform:translateY(0); }
      38% { opacity:1; }
      42% { opacity:0;transform:translateY(-20px); }
      44% { opacity:0;transform:translateY(25px); }
      100% { opacity:0;transform:translateY(25px); }
    }
    @keyframes b3-badge {
      0% { opacity:0;transform:scale(0.8); }
      33% { opacity:0;transform:scale(0.8); }
      36% { opacity:1;transform:scale(1); }
      38% { opacity:1; }
      42% { opacity:0;transform:scale(0.9); }
      44% { opacity:0;transform:scale(0.8); }
      100% { opacity:0;transform:scale(0.8); }
    }

    /* Beat 4: Scanning (15-21s = 42-58%) */
    @keyframes b4 {
      0% { opacity:0;transform:translateY(20px); }
      42% { opacity:0;transform:translateY(20px); }
      45% { opacity:1;transform:translateY(0); }
      55% { opacity:1; }
      58% { opacity:0;transform:translateY(-15px); }
      60% { opacity:0;transform:translateY(20px); }
      100% { opacity:0;transform:translateY(20px); }
    }
    @keyframes sbar {
      0%,44% { transform:scaleX(0); }
      46% { transform:scaleX(0.1); } 48% { transform:scaleX(0.25); }
      50% { transform:scaleX(0.45); } 52% { transform:scaleX(0.65); }
      54% { transform:scaleX(0.85); } 56% { transform:scaleX(1); }
      57% { transform:scaleX(1); } 58% { transform:scaleX(0); }
      100% { transform:scaleX(0); }
    }
    @keyframes cat-flash {
      0%,44% { opacity:0; } 46% { opacity:1; } 47% { opacity:0; }
      48% { opacity:1; } 49% { opacity:0; } 50% { opacity:1; }
      51% { opacity:0; } 52% { opacity:1; } 53% { opacity:0; }
      54% { opacity:1; } 56% { opacity:1; } 58% { opacity:0; }
      100% { opacity:0; }
    }
    @keyframes c1 { 0%,45% { opacity:0; } 46% { opacity:1; } 48% { opacity:0; } 100% { opacity:0; } }
    @keyframes c2 { 0%,47% { opacity:0; } 48% { opacity:1; } 50% { opacity:0; } 100% { opacity:0; } }
    @keyframes c3 { 0%,49% { opacity:0; } 50% { opacity:1; } 52% { opacity:0; } 100% { opacity:0; } }
    @keyframes c4 { 0%,51% { opacity:0; } 52% { opacity:1; } 54% { opacity:0; } 100% { opacity:0; } }
    @keyframes c5 { 0%,53% { opacity:0; } 54% { opacity:1; } 57% { opacity:0; } 100% { opacity:0; } }

    /* Beat 5: Overall score (21-28s = 58-78%) */
    @keyframes b5 {
      0% { opacity:0;transform:scale(0.5);filter:blur(12px); }
      58% { opacity:0;transform:scale(0.5);filter:blur(12px); }
      64% { opacity:1;transform:scale(1);filter:blur(0); }
      73% { opacity:1; }
      78% { opacity:0;transform:scale(1.06);filter:blur(8px); }
      80% { opacity:0;transform:scale(0.5);filter:blur(12px); }
      100% { opacity:0;transform:scale(0.5);filter:blur(12px); }
    }
    @keyframes b5-sub {
      0% { opacity:0;transform:translateY(20px); } 63% { opacity:0;transform:translateY(20px); }
      67% { opacity:1;transform:translateY(0); } 72% { opacity:1; }
      77% { opacity:0;transform:translateY(-15px); } 79% { opacity:0;transform:translateY(20px); }
      100% { opacity:0;transform:translateY(20px); }
    }
    @keyframes pg { 0%,100% { text-shadow:0 0 0 transparent; } 50% { text-shadow:0 0 60px rgba(255,255,255,0.2); } }

    /* Beat 6: CTA (28-35s = 78-97%) */
    @keyframes b6a { 0% { opacity:0;transform:translateY(30px); } 78% { opacity:0;transform:translateY(30px); } 82% { opacity:1;transform:translateY(0); } 92% { opacity:1; } 97% { opacity:0;transform:translateY(-20px); } 99% { opacity:0;transform:translateY(30px); } 100% { opacity:0;transform:translateY(30px); } }
    @keyframes b6b { 0% { opacity:0;transform:translateY(30px); } 80% { opacity:0;transform:translateY(30px); } 84% { opacity:1;transform:translateY(0); } 91% { opacity:1; } 96% { opacity:0;transform:translateY(-20px); } 98% { opacity:0;transform:translateY(30px); } 100% { opacity:0;transform:translateY(30px); } }
    @keyframes b6-btn { 0% { opacity:0;transform:translateY(20px) scale(0.95); } 83% { opacity:0;transform:translateY(20px) scale(0.95); } 87% { opacity:1;transform:translateY(0) scale(1); } 93% { opacity:1; } 96% { opacity:0;transform:translateY(-15px) scale(0.97); } 98% { opacity:0;transform:translateY(20px) scale(0.95); } 100% { opacity:0;transform:translateY(20px) scale(0.95); } }
    @keyframes bgl { 0%,100% { box-shadow:0 0 0 0 rgba(255,255,255,0); } 50% { box-shadow:0 0 0 14px rgba(255,255,255,0.1); } }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="atm">
      <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:40px 40px;opacity:0.5;"></div>
      <div style="position:absolute;top:200px;left:50%;transform:translateX(-50%);width:900px;height:900px;background:rgba(129,140,248,0.15);border-radius:50%;filter:blur(150px);animation:dg 8s ease-in-out infinite;"></div>
    </div>

    <div class="content">
      <!-- Beat 1: Paste your URL -->
      <div class="bt">
        <p style="font-family:'Instrument Serif',Georgia,serif;font-size:84px;font-weight:400;color:#FFFFFF;opacity:0;animation:b1 var(--d) var(--e) infinite;">Paste your URL.</p>
      </div>

      <!-- Beat 2: URL typing -->
      <div class="bt">
        <div style="padding:24px 44px;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.12);border-radius:16px;opacity:0;animation:b2-wrap var(--d) var(--e) infinite;">
          <span style="font-family:'JetBrains Mono',monospace;font-size:40px;color:#FFFFFF;white-space:nowrap;overflow:hidden;display:inline-block;width:0;border-right:3px solid transparent;animation:url-type var(--d) steps(1) infinite, cb 0.8s steps(1) infinite;">yoursite.com</span>
        </div>
      </div>

      <!-- Beat 3: Full Audit selected -->
      <div class="bt">
        <p style="font-size:36px;font-weight:300;color:rgba(255,255,255,0.5);opacity:0;animation:b3 var(--d) var(--e) infinite;">Scan type:</p>
        <div style="margin-top:24px;padding:20px 48px;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:14px;opacity:0;animation:b3-badge var(--d) var(--e) infinite;">
          <p style="font-family:'Instrument Serif',Georgia,serif;font-size:64px;font-weight:400;color:#FFFFFF;">Full Audit</p>
        </div>
        <p style="font-size:30px;font-weight:400;color:rgba(255,255,255,0.4);margin-top:16px;opacity:0;animation:b3 var(--d) var(--e) infinite;">SEO &middot; Accessibility &middot; Security &middot; Performance &middot; Content</p>
      </div>

      <!-- Beat 4: Scanning with category names flashing -->
      <div class="bt">
        <div style="opacity:0;animation:b4 var(--d) var(--e) infinite;">
          <p style="font-family:'JetBrains Mono',monospace;font-size:36px;color:rgba(255,255,255,0.6);margin-bottom:32px;">Scanning...</p>
          <!-- Category names flash one at a time -->
          <div style="position:relative;height:60px;width:500px;margin:0 auto;">
            <span style="position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:48px;font-weight:600;color:#8B5CF6;opacity:0;animation:c1 var(--d) var(--e) infinite;">SEO</span>
            <span style="position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:48px;font-weight:600;color:#10B981;opacity:0;animation:c2 var(--d) var(--e) infinite;">Accessibility</span>
            <span style="position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:48px;font-weight:600;color:#EF4444;opacity:0;animation:c3 var(--d) var(--e) infinite;">Security</span>
            <span style="position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:48px;font-weight:600;color:#0EA5E9;opacity:0;animation:c4 var(--d) var(--e) infinite;">Performance</span>
            <span style="position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:48px;font-weight:600;color:#F59E0B;opacity:0;animation:c5 var(--d) var(--e) infinite;">Content</span>
          </div>
          <div style="width:500px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin:32px auto 0;">
            <div style="width:100%;height:100%;background:linear-gradient(90deg,#818CF8,#FBBF24);border-radius:3px;transform-origin:left;transform:scaleX(0);animation:sbar var(--d) var(--e) infinite;"></div>
          </div>
        </div>
      </div>

      <!-- Beat 5: Overall score -->
      <div class="bt">
        <p style="font-size:200px;font-weight:700;color:#FFFFFF;line-height:1;opacity:0;animation:b5 var(--d) var(--e) infinite, pg 3s ease-in-out infinite;">82</p>
        <p style="font-size:44px;font-weight:400;color:rgba(255,255,255,0.6);margin-top:20px;opacity:0;animation:b5-sub var(--d) var(--e) infinite;">Your overall score</p>
      </div>

      <!-- Beat 6: CTA -->
      <div class="bt">
        <p style="font-size:44px;font-weight:300;color:rgba(255,255,255,0.5);opacity:0;animation:b6a var(--d) var(--e) infinite;">What's yours?</p>
        <p style="font-family:'Instrument Serif',Georgia,serif;font-size:88px;font-weight:400;color:#FFFFFF;margin-top:20px;opacity:0;animation:b6b var(--d) var(--e) infinite;">Try Kritano.</p>
        <div style="margin-top:44px;padding:20px 56px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:14px;opacity:0;animation:b6-btn var(--d) var(--e) infinite, bgl 2s ease-in-out infinite;">
          <span style="font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:500;color:#FFFFFF;">kritano.com</span>
        </div>
      </div>
    </div>

    <div class="br">
      <span style="font-family:'Outfit',sans-serif;font-weight:600;font-size:18px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);animation:wp 4s ease-in-out infinite;"><svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:8px;display:inline-block;"><rect width="32" height="32" rx="7" fill="#4f46e5"/><rect x="3" y="3" width="26" height="26" rx="5" fill="#312e81"/><path d="M10 7 L10 25 L13.5 25 L13.5 17.5 L19.5 25 L24 25 L17 16 L23.5 7 L19.5 7 L13.5 14.5 L13.5 7 Z" fill="white"/><circle cx="24" cy="6.5" r="2.5" fill="#fbbf24"/></svg>Kritano</span>
    </div>
  </div>
</body>
</html>
