<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1080px; overflow: hidden; }
    .container {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: 'Outfit', system-ui, sans-serif;
      background: #F8FAFC;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Atmospheric accents -->
    <div style="position:absolute;top:-80px;right:-60px;width:400px;height:400px;background:#EEF2FF;border-radius:50%;opacity:0.7;filter:blur(80px);pointer-events:none;"></div>
    <div style="position:absolute;bottom:-60px;left:-40px;width:320px;height:320px;background:#FFFBEB;border-radius:50%;opacity:0.5;filter:blur(80px);pointer-events:none;"></div>

    <!-- Content — top-down flow, padding-top:200px for visual centring -->
    <div style="position:relative;z-index:1;padding:200px 100px 70px;height:100%;">

      <!-- Large open quote mark -->
      <div style="font-family:'Instrument Serif',Georgia,serif;font-size:120px;color:#C7D2FE;line-height:0.6;margin-bottom:24px;">"</div>

      <!-- Quote -->
      <blockquote style="font-family:'Instrument Serif',Georgia,serif;font-size:44px;font-weight:400;color:#0F172A;line-height:1.35;font-style:italic;margin-bottom:40px;max-width:780px;">
        The power of the Web is in its universality. Access by everyone regardless of disability is an essential aspect.
      </blockquote>

      <!-- Attribution -->
      <div style="display:flex;align-items:center;gap:16px;">
        <div style="width:48px;height:2px;background:#4F46E5;border-radius:1px;"></div>
        <p style="font-size:20px;font-weight:600;color:#4F46E5;">Tim Berners-Lee</p>
      </div>
      <p style="font-size:16px;color:#94A3B8;margin-top:8px;padding-left:64px;">Inventor of the World Wide Web</p>

      <!-- Branding -->
      <div style="position:absolute;bottom:32px;right:100px;">
        <span style="font-family:'Instrument Serif',Georgia,serif;font-size:20px;color:#CBD5E1;"><svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:6px;display:inline-block;"><rect width="32" height="32" rx="7" fill="#4f46e5"/><rect x="3" y="3" width="26" height="26" rx="5" fill="#312e81"/><path d="M10 7 L10 25 L13.5 25 L13.5 17.5 L19.5 25 L24 25 L17 16 L23.5 7 L19.5 7 L13.5 14.5 L13.5 7 Z" fill="white"/><circle cx="24" cy="6.5" r="2.5" fill="#fbbf24"/></svg>Kritano</span>
      </div>
    </div>
  </div>
</body>
</html>
