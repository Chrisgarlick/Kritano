<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
    }
    .container {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: 'Outfit', system-ui, sans-serif;
      background: #F8FAFC;
    }
    .font-display { font-family: 'Instrument Serif', Georgia, serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Atmospheric accents -->
    <div style="position:absolute;top:-120px;right:-80px;width:600px;height:600px;background:#EEF2FF;border-radius:50%;opacity:0.7;filter:blur(100px);pointer-events:none;"></div>
    <div style="position:absolute;bottom:-100px;left:-60px;width:500px;height:500px;background:#FFFBEB;border-radius:50%;opacity:0.5;filter:blur(100px);pointer-events:none;"></div>
    <div style="position:absolute;bottom:200px;right:300px;width:300px;height:300px;background:#EEF2FF;border-radius:50%;opacity:0.4;filter:blur(80px);pointer-events:none;"></div>

    <!-- Content -->
    <div style="position:relative;z-index:1;padding:90px 100px 70px;height:100%;display:flex;gap:80px;">
      <!-- Left side: Title and text -->
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
        <p style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:600;color:#10B981;text-transform:uppercase;letter-spacing:0.1em;">Accessibility</p>
        <h1 style="font-family:'Instrument Serif',Georgia,serif;font-size:72px;font-weight:400;color:#0F172A;line-height:1.1;margin-top:20px;">
          Why 96% of Websites<br>Are Still Failing
        </h1>
        <p style="font-family:'Outfit',sans-serif;font-size:28px;font-weight:400;color:#64748B;line-height:1.5;margin-top:24px;max-width:700px;">
          The state of web accessibility in 2026 -- and what the data says about the basics we keep getting wrong.
        </p>
      </div>

      <!-- Right side: Big stat -->
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:420px;">
        <div style="background:#FFFFFF;border:1px solid #E2E8F0;border-radius:24px;box-shadow:0 1px 3px rgba(15,23,42,0.1);padding:48px 56px;text-align:center;">
          <p style="font-family:'Instrument Serif',Georgia,serif;font-size:160px;font-weight:400;color:#EF4444;line-height:1;">96%</p>
          <p style="font-family:'Outfit',sans-serif;font-size:22px;font-weight:500;color:#64748B;margin-top:8px;">of homepages have<br>WCAG failures</p>
          <div style="display:flex;align-items:center;gap:16px;margin-top:24px;justify-content:center;">
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="width:8px;height:8px;border-radius:50%;background:#EF4444;display:inline-block;"></span>
              <span style="font-family:'Outfit',sans-serif;font-size:15px;color:#64748B;">Critical</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="width:8px;height:8px;border-radius:50%;background:#F97316;display:inline-block;"></span>
              <span style="font-family:'Outfit',sans-serif;font-size:15px;color:#64748B;">Serious</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="width:8px;height:8px;border-radius:50%;background:#F59E0B;display:inline-block;"></span>
              <span style="font-family:'Outfit',sans-serif;font-size:15px;color:#64748B;">Moderate</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Branding -->
    <div style="position:absolute;bottom:32px;right:100px;display:flex;align-items:center;z-index:2;">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:6px;display:inline-block;">
        <rect width="32" height="32" rx="7" fill="#4f46e5"/>
        <rect x="3" y="3" width="26" height="26" rx="5" fill="#312e81"/>
        <path d="M10 7 L10 25 L13.5 25 L13.5 17.5 L19.5 25 L24 25 L17 16 L23.5 7 L19.5 7 L13.5 14.5 L13.5 7 Z" fill="white"/>
        <circle cx="24" cy="6.5" r="2.5" fill="#fbbf24"/>
      </svg>
      <span style="font-family:'Instrument Serif',Georgia,serif;font-size:28px;color:#4F46E5;">Kritano</span>
    </div>
  </div>
</body>
</html>
