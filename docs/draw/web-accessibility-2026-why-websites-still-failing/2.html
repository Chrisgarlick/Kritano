<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
    }
    .container {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: 'Outfit', system-ui, sans-serif;
      background: linear-gradient(180deg, #1E1B4B 0%, #0F172A 100%);
    }
    .font-display { font-family: 'Instrument Serif', Georgia, serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Grid overlay -->
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>
    <!-- Indigo glow top right -->
    <div style="position:absolute;top:-150px;right:-100px;width:600px;height:600px;background:rgba(99,102,241,0.2);border-radius:50%;filter:blur(120px);pointer-events:none;"></div>
    <!-- Amber glow bottom left -->
    <div style="position:absolute;bottom:-100px;left:200px;width:400px;height:400px;background:rgba(251,191,36,0.08);border-radius:50%;filter:blur(100px);pointer-events:none;"></div>

    <!-- Content -->
    <div style="position:relative;z-index:1;padding:90px 100px 70px;height:100%;">
      <div style="display:flex;height:100%;gap:80px;align-items:center;">
        <!-- Left: Title -->
        <div style="flex:1;">
          <div style="display:inline-block;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:6px 16px;">
            <span style="font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;color:#10B981;text-transform:uppercase;letter-spacing:0.1em;">Accessibility</span>
          </div>
          <h1 style="font-family:'Instrument Serif',Georgia,serif;font-size:76px;font-weight:400;color:#FFFFFF;line-height:1.1;margin-top:28px;">
            The State of Web<br>Accessibility in 2026
          </h1>
          <p style="font-family:'Outfit',sans-serif;font-size:26px;font-weight:400;color:#CBD5E1;line-height:1.5;margin-top:24px;max-width:680px;">
            96% of websites still fail basic checks. The data is clear -- but so are the fixes.
          </p>
        </div>

        <!-- Right: Failure breakdown cards -->
        <div style="min-width:520px;display:flex;flex-direction:column;gap:14px;">
          <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:22px 28px;display:flex;align-items:center;justify-content:space-between;">
            <span style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:500;color:#FFFFFF;">Low contrast text</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:#EF4444;">81%</span>
          </div>
          <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:22px 28px;display:flex;align-items:center;justify-content:space-between;">
            <span style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:500;color:#FFFFFF;">Missing alt text</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:#F97316;">54.5%</span>
          </div>
          <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:22px 28px;display:flex;align-items:center;justify-content:space-between;">
            <span style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:500;color:#FFFFFF;">Empty links</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:#F97316;">48.6%</span>
          </div>
          <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:22px 28px;display:flex;align-items:center;justify-content:space-between;">
            <span style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:500;color:#FFFFFF;">Missing form labels</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:#F59E0B;">45.9%</span>
          </div>
          <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:22px 28px;display:flex;align-items:center;justify-content:space-between;">
            <span style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:500;color:#FFFFFF;">Missing document language</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:#FBBF24;">18.6%</span>
          </div>
          <p style="font-family:'JetBrains Mono',monospace;font-size:14px;color:#64748B;margin-top:4px;text-align:right;">Source: WebAIM Million 2025</p>
        </div>
      </div>
    </div>

    <!-- Branding -->
    <div style="position:absolute;bottom:32px;right:100px;display:flex;align-items:center;z-index:2;">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:6px;display:inline-block;">
        <rect width="32" height="32" rx="7" fill="#4f46e5"/>
        <rect x="3" y="3" width="26" height="26" rx="5" fill="#312e81"/>
        <path d="M10 7 L10 25 L13.5 25 L13.5 17.5 L19.5 25 L24 25 L17 16 L23.5 7 L19.5 7 L13.5 14.5 L13.5 7 Z" fill="white"/>
        <circle cx="24" cy="6.5" r="2.5" fill="#fbbf24"/>
      </svg>
      <span style="font-family:'Instrument Serif',Georgia,serif;font-size:28px;color:#FFFFFF;">Kritano</span>
    </div>
  </div>
</body>
</html>
