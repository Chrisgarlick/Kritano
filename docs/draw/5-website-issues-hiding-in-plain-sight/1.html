<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1080px; overflow: hidden; }
    .container {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: 'Outfit', system-ui, sans-serif;
      background: linear-gradient(180deg, #1E1B4B 0%, #0F172A 100%);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Grid overlay -->
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>
    <!-- Indigo glow -->
    <div style="position:absolute;top:-120px;right:-80px;width:500px;height:500px;background:rgba(99,102,241,0.18);border-radius:50%;filter:blur(100px);pointer-events:none;"></div>
    <!-- Amber glow -->
    <div style="position:absolute;bottom:-100px;left:-60px;width:400px;height:400px;background:rgba(251,191,36,0.08);border-radius:50%;filter:blur(100px);pointer-events:none;"></div>
    <!-- Background 5 -->
    <div style="position:absolute;top:240px;left:50%;transform:translateX(-50%);font-family:'Instrument Serif',Georgia,serif;font-size:220px;font-weight:400;color:rgba(255,255,255,0.04);line-height:1;pointer-events:none;">5</div>

    <!-- Slide indicator — matches slides 2-6: top:48px, left:100px -->
    <div style="position:absolute;top:48px;left:100px;right:100px;display:flex;align-items:center;justify-content:space-between;z-index:2;">
      <div style="display:flex;gap:8px;">
        <div style="width:32px;height:4px;border-radius:2px;background:#FBBF24;"></div>
        <div style="width:32px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
        <div style="width:32px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
        <div style="width:32px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
        <div style="width:32px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
        <div style="width:32px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
        <div style="width:32px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      </div>
    </div>

    <!-- Label -->
    <p style="position:absolute;top:220px;left:0;right:0;text-align:center;font-size:18px;font-weight:600;color:#FBBF24;text-transform:uppercase;letter-spacing:0.15em;z-index:1;">
      Accessibility Series
    </p>

    <!-- Headline -->
    <h1 style="position:absolute;top:268px;left:140px;right:140px;text-align:center;font-family:'Instrument Serif',Georgia,serif;font-size:76px;font-weight:400;color:#FFFFFF;line-height:1.1;z-index:1;">
      5 Website Issues Hiding in Plain Sight
    </h1>

    <!-- Subtitle -->
    <p style="position:absolute;top:560px;left:180px;right:180px;text-align:center;font-size:28px;font-weight:400;color:#94A3B8;line-height:1.5;z-index:1;">
      Common problems that hurt your users, your SEO, and your legal compliance.
    </p>

    <!-- Swipe hint -->
    <div style="position:absolute;top:880px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:12px;z-index:1;">
      <span style="font-size:16px;font-weight:500;color:rgba(255,255,255,0.3);letter-spacing:0.05em;">SWIPE TO EXPLORE</span>
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="opacity:0.3;">
        <path d="M7 4l6 6-6 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Branding -->
    <div style="position:absolute;top:930px;left:0;right:0;text-align:center;z-index:1;">
      <span style="font-family:'Instrument Serif',Georgia,serif;font-size:22px;color:rgba(255,255,255,0.2);"><svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:6px;display:inline-block;"><rect width="32" height="32" rx="7" fill="#4f46e5"/><rect x="3" y="3" width="26" height="26" rx="5" fill="#312e81"/><path d="M10 7 L10 25 L13.5 25 L13.5 17.5 L19.5 25 L24 25 L17 16 L23.5 7 L19.5 7 L13.5 14.5 L13.5 7 Z" fill="white"/><circle cx="24" cy="6.5" r="2.5" fill="#fbbf24"/></svg>Kritano</span>
    </div>
  </div>
</body>
</html>
