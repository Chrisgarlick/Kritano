<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1080px; overflow: hidden; }
    .container { width: 1080px; height: 1080px; position: relative; overflow: hidden; font-family: 'Outfit', system-ui, sans-serif; background: linear-gradient(180deg, #1E1B4B 0%, #0F172A 100%); }
  </style>
</head>
<body>
  <div class="container">
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>
    <div style="position:absolute;top:-100px;right:-60px;width:450px;height:450px;background:rgba(99,102,241,0.15);border-radius:50%;filter:blur(100px);pointer-events:none;"></div>
    <div style="position:absolute;bottom:-80px;left:-40px;width:350px;height:350px;background:rgba(251,191,36,0.06);border-radius:50%;filter:blur(100px);pointer-events:none;"></div>

    <div style="position:absolute;top:48px;left:90px;display:flex;gap:6px;z-index:2;">
      <div style="width:28px;height:4px;border-radius:2px;background:#FBBF24;"></div>
      <div style="width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
    </div>

    <div style="position:relative;z-index:1;padding:200px 90px 70px;height:100%;text-align:center;">
      <p style="font-size:18px;font-weight:600;color:#FBBF24;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:20px;">Accessibility Guide</p>
      <h1 style="font-family:'Instrument Serif',Georgia,serif;font-size:68px;font-weight:400;color:#FFFFFF;line-height:1.08;margin-bottom:24px;">Colour Contrast:<br>Good vs Bad</h1>
      <p style="font-size:24px;color:#94A3B8;line-height:1.5;max-width:600px;margin:0 auto 40px;">Side-by-side comparisons with actual WCAG ratios. Can you read it? Your users might not be able to.</p>
      <div style="display:flex;justify-content:center;gap:16px;">
        <div style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:10px 20px;">
          <span style="font-size:15px;font-weight:600;color:#F87171;">Fail</span>
        </div>
        <div style="background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.25);border-radius:8px;padding:10px 20px;">
          <span style="font-size:15px;font-weight:600;color:#34D399;">Pass</span>
        </div>
      </div>

      <div style="position:absolute;bottom:32px;right:90px;">
        <span style="font-family:'Instrument Serif',Georgia,serif;font-size:20px;color:rgba(255,255,255,0.18);">PagePulser</span>
      </div>
    </div>
  </div>
</body>
</html>
