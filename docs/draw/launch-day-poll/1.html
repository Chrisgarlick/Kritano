<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1080px; overflow: hidden; }
    .container { width: 1080px; height: 1080px; position: relative; overflow: hidden; font-family: 'Outfit', system-ui, sans-serif; background: #F8FAFC; }
  </style>
</head>
<body>
  <div class="container">
    <div style="position:absolute;top:-80px;right:-60px;width:400px;height:400px;background:#EEF2FF;border-radius:50%;opacity:0.7;filter:blur(80px);pointer-events:none;"></div>
    <div style="position:absolute;bottom:-60px;left:-40px;width:300px;height:300px;background:#FFFBEB;border-radius:50%;opacity:0.5;filter:blur(80px);pointer-events:none;"></div>

    <div style="position:relative;z-index:1;padding:200px 90px 70px;height:100%;text-align:center;">
      <!-- Label -->
      <p style="font-size:18px;font-weight:600;color:#4F46E5;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:24px;">Launch Day</p>

      <!-- Question -->
      <h1 style="font-family:'Instrument Serif',Georgia,serif;font-size:56px;font-weight:400;color:#0F172A;line-height:1.12;margin-bottom:48px;max-width:700px;margin-left:auto;margin-right:auto;">Are you going to audit your website on launch day?</h1>

      <!-- Poll buttons -->
      <div style="display:flex;flex-direction:column;gap:16px;max-width:500px;margin:0 auto;">
        <div style="background:#FFFFFF;border:2px solid #4F46E5;border-radius:14px;padding:22px 32px;cursor:pointer;">
          <span style="font-size:22px;font-weight:600;color:#4F46E5;">Yes</span>
        </div>
        <div style="background:#FFFFFF;border:2px solid #4F46E5;border-radius:14px;padding:22px 32px;cursor:pointer;">
          <span style="font-size:22px;font-weight:600;color:#4F46E5;">Already on the waitlist</span>
        </div>
      </div>

      <div style="position:absolute;bottom:32px;left:0;right:0;text-align:center;">
        <span style="font-family:'Instrument Serif',Georgia,serif;font-size:20px;color:#CBD5E1;">PagePulser</span>
      </div>
    </div>
  </div>
</body>
</html>
