<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }
    .container {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      font-family: 'Outfit', system-ui, sans-serif;
      background: #F8FAFC;
    }
    .font-display { font-family: 'Instrument Serif', Georgia, serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Atmospheric: indigo accent top-right -->
    <div style="position:absolute;top:-120px;right:-100px;width:500px;height:500px;background:#EEF2FF;border-radius:50%;opacity:0.7;filter:blur(80px);pointer-events:none;"></div>
    <!-- Atmospheric: amber accent bottom-left -->
    <div style="position:absolute;bottom:-80px;left:-60px;width:400px;height:400px;background:#FFFBEB;border-radius:50%;opacity:0.6;filter:blur(80px);pointer-events:none;"></div>

    <!-- Content -->
    <div style="position:relative;z-index:1;padding:200px 100px 70px;height:100%;text-align:center;">

      <!-- Label -->
      <p style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:600;color:#4F46E5;text-transform:uppercase;letter-spacing:0.15em;">
        Early Access
      </p>

      <!-- Big number -->
      <p style="font-family:'Instrument Serif',Georgia,serif;font-size:260px;font-weight:400;color:#0F172A;line-height:1;margin-top:24px;">
        7
      </p>

      <!-- Days to launch -->
      <p style="font-family:'Instrument Serif',Georgia,serif;font-size:64px;font-weight:400;color:#334155;line-height:1.1;margin-top:8px;">
        days to launch
      </p>

      <!-- Subtle divider -->
      <div style="display:flex;align-items:center;gap:16px;margin:40px auto;max-width:300px;">
        <div style="flex:1;height:1px;background:#E2E8F0;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#4F46E5;opacity:0.3;"></div>
        <div style="flex:1;height:1px;background:#E2E8F0;"></div>
      </div>

      <!-- CTA -->
      <div style="display:inline-block;background:#4F46E5;border-radius:14px;padding:16px 44px;margin-bottom:12px;">
        <p style="font-family:'Outfit',sans-serif;font-size:24px;font-weight:600;color:#FFFFFF;">
          Get early access — link in bio
        </p>
      </div>

      <!-- Branding -->
      <div style="position:absolute;bottom:40px;left:0;right:0;text-align:center;">
        <span style="font-family:'Instrument Serif',Georgia,serif;font-size:32px;color:#4F46E5;">
          Kritano
        </span>
      </div>
    </div>
  </div>
</body>
</html>
