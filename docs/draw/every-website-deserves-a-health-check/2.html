<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1080px; overflow: hidden; }
    .container { width: 1080px; height: 1080px; position: relative; overflow: hidden; font-family: 'Outfit', system-ui, sans-serif; background: linear-gradient(180deg, #1E1B4B 0%, #0F172A 100%); }
  </style>
</head>
<body>
  <div class="container">
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>
    <div style="position:absolute;top:-100px;right:-60px;width:450px;height:450px;background:rgba(99,102,241,0.12);border-radius:50%;filter:blur(100px);pointer-events:none;"></div>
    <div style="position:absolute;bottom:-80px;left:80px;width:350px;height:350px;background:rgba(99,102,241,0.06);border-radius:50%;filter:blur(100px);pointer-events:none;"></div>

    <div style="position:relative;z-index:1;padding:200px 100px 70px;height:100%;text-align:center;">
      <!-- Large open quote -->
      <div style="font-family:'Instrument Serif',Georgia,serif;font-size:120px;color:rgba(99,102,241,0.15);line-height:0.5;margin-bottom:36px;">"</div>

      <!-- Quote -->
      <h1 style="font-family:'Instrument Serif',Georgia,serif;font-size:68px;font-weight:400;color:#FFFFFF;line-height:1.15;margin-bottom:40px;max-width:750px;margin-left:auto;margin-right:auto;">Every website deserves a health check.</h1>

      <!-- Divider + attribution -->
      <div style="width:48px;height:2px;background:#FBBF24;border-radius:1px;margin:0 auto 20px;"></div>
      <span style="font-family:'Instrument Serif',Georgia,serif;font-size:24px;color:#818CF8;"><svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:6px;display:inline-block;"><rect width="32" height="32" rx="7" fill="#4f46e5"/><rect x="3" y="3" width="26" height="26" rx="5" fill="#312e81"/><path d="M10 7 L10 25 L13.5 25 L13.5 17.5 L19.5 25 L24 25 L17 16 L23.5 7 L19.5 7 L13.5 14.5 L13.5 7 Z" fill="white"/><circle cx="24" cy="6.5" r="2.5" fill="#fbbf24"/></svg>Kritano</span>

      <div style="position:absolute;bottom:32px;left:0;right:0;text-align:center;">
        <span style="font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(255,255,255,0.15);">kritano.com</span>
      </div>
    </div>
  </div>
</body>
</html>
