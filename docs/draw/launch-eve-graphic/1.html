<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1080px; overflow: hidden; }
    .container { width: 1080px; height: 1080px; position: relative; overflow: hidden; font-family: 'Outfit', system-ui, sans-serif; background: #FFFFFF; }
  </style>
</head>
<body>
  <div class="container">
    <div style="position:absolute;top:-80px;right:-60px;width:400px;height:400px;background:#EEF2FF;border-radius:50%;opacity:0.6;filter:blur(80px);pointer-events:none;"></div>
    <div style="position:absolute;bottom:-60px;left:-40px;width:300px;height:300px;background:#EEF2FF;border-radius:50%;opacity:0.4;filter:blur(80px);pointer-events:none;"></div>

    <div style="position:relative;z-index:1;padding:180px 100px 70px;height:100%;">
      <!-- Thin accent line -->
      <div style="width:48px;height:3px;background:#4F46E5;border-radius:2px;margin-bottom:32px;"></div>

      <!-- Tomorrow -->
      <h1 style="font-family:'Instrument Serif',Georgia,serif;font-size:88px;font-weight:400;color:#0F172A;line-height:1.05;margin-bottom:16px;">Tomorrow.</h1>

      <!-- Subline -->
      <p style="font-family:'Instrument Serif',Georgia,serif;font-size:40px;font-weight:400;color:#64748B;line-height:1.25;margin-bottom:40px;">Your website health score awaits.</p>

      <!-- Early access urgency -->
      <div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:14px;padding:24px 28px;margin-bottom:32px;max-width:620px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:8px;height:8px;border-radius:50%;background:#EF4444;"></div>
          <span style="font-size:16px;font-weight:600;color:#DC2626;text-transform:uppercase;letter-spacing:0.08em;">Last Chance</span>
        </div>
        <p style="font-size:20px;color:#334155;line-height:1.45;">Early access pricing ends at launch. Any remaining spots close tomorrow — no extensions, no discount codes after that.</p>
      </div>

      <!-- CTA hint -->
      <p style="font-size:18px;color:#94A3B8;line-height:1.4;">Link in bio to claim your spot before it's gone.</p>

      <div style="position:absolute;bottom:32px;left:0;right:0;text-align:center;">
        <span style="font-family:'Instrument Serif',Georgia,serif;font-size:22px;color:#CBD5E1;"><svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:6px;display:inline-block;"><rect width="32" height="32" rx="7" fill="#4f46e5"/><rect x="3" y="3" width="26" height="26" rx="5" fill="#312e81"/><path d="M10 7 L10 25 L13.5 25 L13.5 17.5 L19.5 25 L24 25 L17 16 L23.5 7 L19.5 7 L13.5 14.5 L13.5 7 Z" fill="white"/><circle cx="24" cy="6.5" r="2.5" fill="#fbbf24"/></svg>Kritano</span>
      </div>
    </div>
  </div>
</body>
</html>
