<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1080px; overflow: hidden; }
    .container { width: 1080px; height: 1080px; position: relative; overflow: hidden; font-family: 'Outfit', system-ui, sans-serif; background: linear-gradient(135deg, #4F46E5 0%, #312E81 100%); }
  </style>
</head>
<body>
  <div class="container">
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>
    <div style="position:absolute;top:0;right:0;width:500px;height:500px;background:rgba(99,102,241,0.3);border-radius:50%;filter:blur(120px);pointer-events:none;"></div>

    <div style="position:relative;z-index:1;padding:160px 90px 70px;height:100%;text-align:center;">
      <p style="font-size:18px;font-weight:600;color:#FBBF24;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:28px;">One Day Left</p>

      <h1 style="font-family:'Instrument Serif',Georgia,serif;font-size:80px;font-weight:400;color:#FFFFFF;line-height:1.05;margin-bottom:16px;">Tomorrow.</h1>

      <p style="font-size:28px;color:rgba(255,255,255,0.5);line-height:1.4;margin-bottom:36px;max-width:600px;margin-left:auto;margin-right:auto;">Your website health score awaits.</p>

      <!-- Two info blocks side by side -->
      <div style="display:flex;gap:16px;max-width:660px;margin:0 auto 28px;text-align:left;">
        <div style="flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:22px;">
          <p style="font-size:14px;font-weight:600;color:#FBBF24;margin-bottom:8px;">What launches</p>
          <p style="font-size:16px;color:rgba(255,255,255,0.7);line-height:1.4;">Full audit platform. SEO, accessibility, security, performance. Free tier included.</p>
        </div>
        <div style="flex:1;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:22px;">
          <p style="font-size:14px;font-weight:600;color:#F87171;margin-bottom:8px;">What closes</p>
          <p style="font-size:16px;color:rgba(255,255,255,0.7);line-height:1.4;">Early access pricing. Remaining spots gone at launch. No discount codes after.</p>
        </div>
      </div>

      <!-- CTA -->
      <div style="display:inline-block;background:#FFFFFF;border-radius:12px;padding:18px 44px;margin-bottom:20px;">
        <span style="font-size:22px;font-weight:600;color:#4F46E5;">Claim Your Spot</span>
      </div>

      <p style="font-size:15px;color:rgba(255,255,255,0.25);">pagepulser.com</p>

      <div style="position:absolute;bottom:32px;left:0;right:0;text-align:center;">
        <span style="font-family:'Instrument Serif',Georgia,serif;font-size:20px;color:rgba(255,255,255,0.18);">PagePulser</span>
      </div>
    </div>
  </div>
</body>
</html>
