<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1080px; overflow: hidden; }
    .container { width: 1080px; height: 1080px; position: relative; overflow: hidden; font-family: 'Outfit', system-ui, sans-serif; background: linear-gradient(135deg, #4F46E5 0%, #312E81 100%); }
  </style>
</head>
<body>
  <div class="container">
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>
    <div style="position:absolute;top:0;right:0;width:500px;height:500px;background:rgba(99,102,241,0.3);border-radius:50%;filter:blur(120px);pointer-events:none;"></div>

    <div style="position:absolute;top:48px;left:90px;display:flex;gap:6px;z-index:2;">
      <div style="width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:28px;height:4px;border-radius:2px;background:#FBBF24;"></div>
    </div>

    <div style="position:relative;z-index:1;padding:200px 90px 70px;height:100%;text-align:center;">
      <h1 style="font-family:'Instrument Serif',Georgia,serif;font-size:56px;font-weight:400;color:#FFFFFF;line-height:1.1;max-width:700px;margin:0 auto 24px;">Stop juggling tools. Start seeing clearly.</h1>
      <p style="font-size:24px;color:rgba(255,255,255,0.55);line-height:1.5;max-width:540px;margin:0 auto 36px;">One audit. Four dimensions. Plain English. Results in under two minutes.</p>
      <div style="display:inline-block;background:#FFFFFF;border-radius:12px;padding:18px 44px;margin-bottom:28px;">
        <span style="font-size:22px;font-weight:600;color:#4F46E5;">Try Kritano Free</span>
      </div>
      <p style="font-size:15px;color:rgba(255,255,255,0.25);">No credit card required.</p>

      <div style="position:absolute;bottom:32px;left:0;right:0;text-align:center;">
        <span style="font-family:'Instrument Serif',Georgia,serif;font-size:20px;color:rgba(255,255,255,0.18);">Kritano</span>
      </div>
    </div>
  </div>
</body>
</html>
