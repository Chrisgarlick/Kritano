services:
  postgres:
    image: postgres:16-alpine
    container_name: pagepulser-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pagepulser
      POSTGRES_PASSWORD: pagepulser_dev_password
      POSTGRES_DB: pagepulser
    ports:
      - "5433:5432"  # Using 5433 externally to avoid conflict
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pagepulser -d pagepulser"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pagepulser-redis
    restart: unless-stopped
    ports:
      - "6380:6379"  # Using 6380 externally to avoid conflict
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: pagepulser-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_data:
  redis_data:
