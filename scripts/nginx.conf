# Security headers — included in every location that uses add_header
# (nginx's add_header in a location block replaces all parent add_headers)
map $uri $dummy {
    default 0;
}

server {
    listen 80;
    server_name kritano.com www.kritano.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name kritano.com www.kritano.com;

    # SSL certs
    ssl_certificate /etc/letsencrypt/live/kritano.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kritano.com/privkey.pem;

    # Hide server version
    server_tokens off;

    # Security headers (applied to all responses unless overridden by location add_header)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com; frame-src 'self' https://www.googletagmanager.com; frame-ancestors 'self';" always;

    # Allow .well-known (security.txt, acme-challenge, etc.)
    location ^~ /.well-known/ {
        root /home/deploy/kritano/client/dist;
    }

    # Block access to all other dotfiles (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Block sensitive files
    location = /config.json {
        return 404;
    }

    # Block PHP files and common CMS probes (SPA returns 200 for everything via try_files)
    location ~ \.php$ {
        return 404;
    }
    location ~ ^/(wp-admin|wp-login|wp-config|wp-content|wp-includes|xmlrpc|administrator|admin\.php) {
        return 404;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Client max body size (for file uploads)
    client_max_body_size 10m;

    # API — proxy to Express
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Sitemap XSL stylesheet (static file from client/dist)
    location = /sitemap.xsl {
        root /home/deploy/kritano/client/dist;
        types { application/xml xsl; }
        default_type application/xml;
    }

    # Dynamic sitemap (proxy to Express)
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Uploaded files (blog images, etc.)
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # Repeat security headers (nginx location add_header replaces parent)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # Webhook routes (need raw body)
    location /api/webhooks/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static frontend — serve from Vite build output
    location / {
        root /home/deploy/kritano/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache HTML pages briefly (SPA shell)
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=86400" always;
        # Repeat security headers (nginx location add_header replaces parent)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com; frame-src 'self' https://www.googletagmanager.com; frame-ancestors 'self';" always;

        # Cache static assets aggressively (nested location inherits root)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            # Repeat security headers
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        }
    }
}
